# Generic-HTTP authorization (experimental)
#
# Generic-HTTP authorization for non-MCP traffic using the CPEX policy
# engine. The `policy` filter loads a policy that declares only a `global`
# HTTP policy (no entity routes), so it authorizes at the HTTP layer: it
# resolves JWT identity and evaluates the CPEX `global` policy over the HTTP
# request line, headers, and identity claims. Denials become plain HTTP
# responses (with a custom `denyWith` status/body/headers).
#
# Requires building with the `cpex-policy-engine` feature, which is off
# by default:
#
# Usage:
#   cargo run -p praxis-proxy --features cpex-policy-engine -- -c examples/configs/security/policy-http.yaml

listeners:
  - name: default
    address: "127.0.0.1:8080"
    filter_chains:
      - main

filter_chains:
  - name: main
    filters:
      # Generic-HTTP authorization. `config_path` points at the CPEX policy
      # document. The policy declares only a `global` HTTP policy (no entity
      # routes), so the filter authorizes at the HTTP layer directly — no
      # protocol classifier needed.
      - filter: policy
        config_path: /etc/praxis/policy-http-cpex-policy.yaml

      - filter: router
        routes:
          - path_prefix: "/"
            cluster: backend

      - filter: load_balancer
        clusters:
          - name: backend
            endpoints:
              - "127.0.0.1:3000"
